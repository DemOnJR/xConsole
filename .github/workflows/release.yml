name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.1.1 && git push origin v0.1.1
# (Bump "version" in package.json AND src-tauri/tauri.conf.json to match first.)
#
# This builds the signed Windows installer, generates the updater manifest
# (latest.json + .sig), and creates a DRAFT GitHub release with them attached.
# Review the draft, then click "Publish" — only then do existing users get the
# auto-update prompt (the updater reads /releases/latest, which ignores drafts).
#
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY           – contents of .tauri-signing/xconsole.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  – the key's password (empty string if none)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Build, sign & publish the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "xConsole ${{ github.ref_name }}"
          releaseBody: "Download the installer below to install xConsole. Existing users will be prompted to update automatically."
          releaseDraft: true
          prerelease: false
