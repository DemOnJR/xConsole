# cargo-deny policy. Run:  cargo deny check
# Security advisories + license + source enforcement for the Rust dependency tree.

[advisories]
# Use the RustSec advisory DB. Security-critical advisories fail the build.
version = 2
yanked = "deny"
ignore = []

[bans]
# Flag multiple versions of the same crate (bloat / hidden duplicate supply chain).
multiple-versions = "warn"
wildcards = "deny"
allow = []
deny = []

[sources]
# Only allow crates from the official registry; block unknown registries/git sources.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

[licenses]
version = 2
# Permissive licenses acceptable for a desktop app; expand deliberately.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
]
confidence-threshold = 0.9
