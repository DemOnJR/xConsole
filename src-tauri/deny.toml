# cargo-deny policy. Run:  cargo deny check
# Security advisories + license + source enforcement for the Rust dependency tree.

[advisories]
# Use the RustSec advisory DB. Security-critical advisories fail the build.
version = 2
yanked = "deny"
# Only fail on unmaintained crates we depend on *directly*. The gtk-rs GTK3 stack,
# unic-*, and proc-macro-error are unmaintained but reach us transitively through
# tauri and its Linux webview deps, which we can't unpin.
unmaintained = "workspace"
ignore = [
  # rsa "Marvin Attack" timing side-channel (RUSTSEC-2023-0071). No fixed version
  # exists upstream — the advisory itself says "no fixed upgrade available". rsa
  # reaches us only via russh's `rsa` feature (RSA SSH user/host keys); our
  # app-managed keys are Ed25519 and we connect only to user-configured trusted
  # servers, so practical exposure is low. Revisit when rsa ships a constant-time fix.
  "RUSTSEC-2023-0071",
]

[bans]
# Flag multiple versions of the same crate (bloat / hidden duplicate supply chain).
multiple-versions = "warn"
wildcards = "deny"
allow = []
deny = []

[sources]
# Only allow crates from the official registry; block unknown registries/git sources.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

[licenses]
version = 2
# Permissive licenses acceptable for a desktop app; expand deliberately.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
  # Mozilla CA root bundle (webpki-roots / webpki-root-certs) — a permissive data
  # license for the trust-anchor list pulled in via the rustls TLS stack.
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9
